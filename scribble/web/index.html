<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self'; img-src 'self' blob: data:; style-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'self'">
  <title>Scribble — annotate your question paper</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- ?v= queries bust browser caches: python http.server sends no cache
       headers, and a stale app.js running against a fresh .wasm was the
       single biggest source of "it broke after an update". Bump APP_VERSION
       in app.js and these together on every release. -->
  <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
  <!-- ============================ TOP BAR ============================ -->
  <!-- Document-level actions: open the paper, manage the file, toggle views.
       Deliberately NOT the drawing tools (those live in the left rail). -->
  <header id="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24"><path d="M3 17c3-6 5-8 6-7s-2 6-1 7 4-3 5-2-1 4 0 4 3-2 8-3"/></svg>
      Scribble
    </div>

    <button id="btn-open" class="btn labeled" title="Open a PDF or HTML file to annotate">
      <svg viewBox="0 0 24 24"><path d="M4 20V4a1 1 0 0 1 1-1h8l6 6v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M13 3v6h6"/></svg>
      Open
    </button>

    <div class="topbar-right">
      <!-- View toggles -->
      <button id="btn-thumbs" class="btn" title="Show/hide page thumbnails" aria-label="Toggle page thumbnails" disabled>
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="6" height="7"/><rect x="3" y="14" width="6" height="7"/><path d="M12 5h9M12 9h9M12 15h9M12 19h9"/></svg>
      </button>
      <button id="btn-notes" class="btn labeled" title="Show/hide your working notes" disabled>
        <svg viewBox="0 0 24 24"><path d="M13 3H5a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V10"/><path d="M14 3l6 6"/><path d="M8 13h8M8 17h5"/></svg>
        Notes
      </button>
      <button id="btn-palette" class="btn" title="Toggle colorblind-safe palette (green→brown, red→vermillion)" aria-label="Toggle colorblind-safe palette">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18"/></svg>
      </button>
      <button id="btn-big" class="btn" title="Toggle larger controls" aria-label="Toggle larger controls">
        <svg viewBox="0 0 24 24"><path d="M3 18L8 6l5 12"/><path d="M4.7 14h6.6"/><path d="M14 18l3.5-8 3.5 8"/></svg>
      </button>

      <span class="bar-divider"></span>

      <!-- File: Save/Resume are a pair (your editable session); Export is the deliverable. -->
      <button id="btn-save" class="btn labeled" title="Save your work to a file you can resume from later (shortcut: Ctrl/Cmd+S)" disabled>
        <svg viewBox="0 0 24 24"><path d="M5 3h11l5 5v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M8 3v5h7V3"/><path d="M7 21v-7h10v7"/></svg>
        Save
      </button>
      <button id="btn-load" class="btn labeled" title="Re-open a saved work file (.json) to continue where you left off" disabled>
        <svg viewBox="0 0 24 24"><path d="M3 7V5a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v2"/><path d="M3 7h18l-2 12H5L3 7z"/></svg>
        Resume
      </button>
      <button id="btn-export" class="btn primary labeled" title="Final step: download the annotated paper (and your notes) as a PDF" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/></svg>
        Export PDF
      </button>
    </div>
  </header>

  <!-- ============================ MAIN ROW =========================== -->
  <div id="main">
    <!-- ---------------------- LEFT TOOL RAIL ---------------------- -->
    <!-- The drawing/capture MODES (mutually exclusive). Color and line
         thickness are NOT here — they appear in the contextual bar over the
         page only when a marking tool is active. -->
    <nav id="rail" aria-label="Tools">
      <div class="rail-group">
        <button class="tool" data-tool="select" title="Select — move, resize or delete any annotation (shortcut: V)">
          <svg viewBox="0 0 24 24"><path d="M6 3l12 9-6 1 3 6-3 1-3-6-4 4V3z"/></svg>
          <span>Select</span>
        </button>
      </div>

      <div class="rail-group">
        <div class="rail-label">Draw</div>
        <button class="tool active" data-tool="pen" title="Pen — draw freehand (shortcut: P)">
          <svg viewBox="0 0 24 24"><path d="M16.5 3.5l4 4L8 20l-5 1 1-5L16.5 3.5z"/></svg>
          <span>Pen</span>
        </button>
        <button class="tool" data-tool="highlighter" title="Highlighter — translucent marker (shortcut: H)">
          <svg viewBox="0 0 24 24"><path d="M14.5 4.5l5 5L9 20H5v-4L14.5 4.5z"/><path d="M3 22h9"/></svg>
          <span>Highlight</span>
        </button>
        <button class="tool" data-tool="text" title="Text note — click the page and type (shortcut: T)">
          <svg viewBox="0 0 24 24"><path d="M5 6V4h14v2"/><path d="M12 4v16"/><path d="M9 20h6"/></svg>
          <span>Text note</span>
        </button>
        <button class="tool" data-tool="eraser" title="Eraser — removes whole strokes, notes and marks (shortcut: E)">
          <svg viewBox="0 0 24 24"><path d="M14 4l6 6-9 9H7l-4-4L14 4z"/><path d="M9 19h12"/></svg>
          <span>Erase</span>
        </button>
      </div>

      <div class="rail-group">
        <div class="rail-label">Marks</div>
        <button class="tool" data-tool="tick" title="Tick mark — click to place, drag to size">
          <svg viewBox="0 0 24 24"><path d="M4 13l5 5L20 6"/></svg>
          <span>Tick</span>
        </button>
        <button class="tool" data-tool="cross" title="Cross mark — click to place, drag to size">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12"/><path d="M18 6L6 18"/></svg>
          <span>Cross</span>
        </button>
        <button class="tool" data-tool="circle" title="Circle — drag around the region to mark">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/></svg>
          <span>Circle</span>
        </button>
        <button class="tool" data-tool="arrow" title="Arrow — drag from tail to tip">
          <svg viewBox="0 0 24 24"><path d="M5 19L19 5"/><path d="M11 5h8v8"/></svg>
          <span>Arrow</span>
        </button>
        <button class="tool" data-tool="rect" title="Box — drag around the region to outline">
          <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
          <span>Box</span>
        </button>
        <button class="tool" data-tool="fillrect" title="Highlight box — drag to tint a whole region">
          <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1"/><path d="M4 6l16 12M10 6L4 11M20 13l-7 5"/></svg>
          <span>Shade</span>
        </button>
      </div>

      <div class="rail-group">
        <div class="rail-label">Capture</div>
        <button class="tool" data-tool="snip" title="Snip — drag a box to copy that region (image + any text) into your notes (shortcut: S)">
          <svg viewBox="0 0 24 24"><path d="M4 8V4h4"/><path d="M16 4h4v4"/><path d="M20 16v4h-4"/><path d="M8 20H4v-4"/><rect x="9" y="9" width="6" height="6"/></svg>
          <span>Snip</span>
        </button>
        <button class="tool" data-tool="pagetext" title="Copy text — select the paper's own text with your cursor and copy it (shortcut: I)">
          <svg viewBox="0 0 24 24"><path d="M5 5h7M8.5 5v14M6 19h5"/><path d="M14 11h6M14 11l-2 4M20 11l2 4M13 19h5"/></svg>
          <span>Copy text</span>
        </button>
      </div>
    </nav>

    <!-- Page thumbnails (auto-shown for multi-page documents) -->
    <aside id="thumbs" hidden></aside>

    <!-- ------------------------- STAGE ---------------------------- -->
    <!-- A non-scrolling frame that holds the scrolling viewer plus the two
         floating overlays (context bar, doc controls), so the overlays stay
         pinned while the page scrolls. -->
    <section id="stage">
      <div id="viewer">
        <p id="placeholder">Open a PDF or HTML file to start scribbling.</p>
        <div id="page-wrap" hidden>
          <canvas id="pdf-canvas"></canvas>
          <iframe id="html-frame" hidden sandbox="allow-same-origin"
                  referrerpolicy="no-referrer" title="Uploaded document"></iframe>
          <div id="text-layer"></div>
          <canvas id="anno-canvas"></canvas>
          <input id="text-input" type="text" maxlength="500" hidden
                 autocomplete="off" spellcheck="false" placeholder="Type, press Enter">
        </div>
      </div>

      <!-- Contextual color + thickness: shown only for marking tools -->
      <div id="context-bar" hidden>
        <div id="colors">
          <button class="swatch active" data-color="black" title="Black"></button>
          <button class="swatch" data-color="red" title="Red"></button>
          <button class="swatch" data-color="blue" title="Blue"></button>
          <button class="swatch" data-color="green" title="Green"></button>
          <button class="swatch" data-color="yellow" title="Yellow"></button>
        </div>
        <span class="bar-divider" id="width-divider"></span>
        <div id="widths" title="Line thickness">
          <button class="btn width" data-width="thin" title="Thin line"><span class="dot d1"></span></button>
          <button class="btn width active" data-width="medium" title="Medium line"><span class="dot d2"></span></button>
          <button class="btn width" data-width="thick" title="Thick line"><span class="dot d3"></span></button>
        </div>
      </div>

      <!-- Floating document controls: page nav + zoom (viewer convention) -->
      <div id="doc-controls" hidden>
        <button id="btn-prev" class="btn" title="Previous page (PageUp / scroll up at the top)" disabled>
          <svg viewBox="0 0 24 24"><path d="M14 6l-6 6 6 6"/></svg>
        </button>
        <span class="readout">
          <input id="page-input" type="number" min="1" value="1" disabled
                 title="Type a page number and press Enter">
          <span id="page-count">/ –</span>
        </span>
        <button id="btn-next" class="btn" title="Next page (PageDown / scroll down at the bottom)" disabled>
          <svg viewBox="0 0 24 24"><path d="M10 6l6 6-6 6"/></svg>
        </button>

        <span class="bar-divider"></span>

        <button id="btn-undo" class="btn" title="Undo (Ctrl/Cmd+Z)" disabled>
          <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 1 3 6.7"/></svg>
        </button>
        <button id="btn-redo" class="btn" title="Redo (Ctrl/Cmd+Y or Ctrl/Cmd+Shift+Z)" disabled>
          <svg viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M21 13a9 9 0 1 0-3 6.7"/></svg>
        </button>

        <span class="bar-divider"></span>

        <button id="btn-zoom-out" class="btn" title="Zoom out" disabled>
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
        </button>
        <select id="zoom-select" title="Zoom level" disabled>
          <option value="fit-width">Fit width</option>
          <option value="fit-page">Fit page</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="3">300%</option>
        </select>
        <button id="btn-zoom-in" class="btn" title="Zoom in" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>

        <span class="bar-divider"></span>

        <div id="scroll-mode" class="seg-group" role="group" aria-label="Page view mode">
          <button id="seg-paged" class="seg active" title="Single page — one page at a time" disabled>
            <svg viewBox="0 0 24 24"><rect x="6" y="4" width="12" height="16" rx="1"/></svg>
            <span>Page</span>
          </button>
          <button id="seg-cont" class="seg" title="Continuous — scroll through every page" disabled>
            <svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="7" rx="1"/><rect x="6" y="14" width="12" height="7" rx="1"/></svg>
            <span>Scroll</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Splitter + Notes pane (unchanged internals) -->
    <div id="splitter" hidden title="Drag to resize notes (double-click to reset)"></div>
    <aside id="notes-pane" hidden>
      <header>
        <span>Notes</span>
        <span>
          <button id="btn-add-note" class="btn" title="Add a text block">＋ Text</button>
          <button id="btn-add-sketch" class="btn" title="Add a blank canvas you can draw on with the same tools">＋ Draw</button>
        </span>
      </header>
      <div id="notes-list"></div>
    </aside>
  </div>

  <div id="status" role="status" aria-live="polite"></div>

  <input id="file-pdf" type="file" accept=".pdf,application/pdf,.html,.htm,text/html" hidden>
  <input id="file-json" type="file" accept=".json,application/json" hidden>

  <script type="module" src="app.js?v=20"></script>
</body>
</html>
