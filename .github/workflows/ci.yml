name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scribble
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Tests
        run: cargo test
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --check
      - name: WASM release build
        run: cargo build --release --target wasm32-unknown-unknown
      # rustsec/audit-check only works at the repo root; run cargo-audit
      # directly inside scribble/ where Cargo.lock lives.
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
